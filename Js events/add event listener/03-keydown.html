<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1> key down </h1>
        <input  id="textid" type="text" placeholder="Type something" onkeydown="keyPress(event)">
    </center>
    <script>
        function keyPress(event) {
            console.log("Key Pressed: " + event.target.value);
        }
    </script>
</body>
</html>
