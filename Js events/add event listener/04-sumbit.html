<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <center>
        <h1> submit</h1>
        <form id="myForm">  
            <input type="text" placeholder="Enter your name" required><br><br>
            <input type="number" placeholder="Enter your age" required><br><br>
            <input type="text" placeholder="Enter your USN" required><br><br>
            <input type="date" placeholder="Enter your DOB" required><br><br>
            <input type="text" placeholder="Enter your address" required><br><br>
            <select required>
                <option value="">Select Blood Group</option>
                <option value="A+">A+</option>
                <option value="A-">A-</option>
                <option value="B+">B+</option>
                <option value="B-">B-</option>
                <option value="AB+">AB+</option>
                <option value="AB-">AB-</option>
                <option value="O+">O+</option>
                <option value="O-">O-</option>
            </select><br><br>
            <select required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select><br><br>   
            <button type="submit">Submit</button>
        </form>

        <script>
            let myForm=document.getElementById("myForm");
            myForm.addEventListener("submit",function(event){
                event.preventDefault();
                alert("form submitted successfully")
            })
        </script>
            
    </center>
</body>
</html>
